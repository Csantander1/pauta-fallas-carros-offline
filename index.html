<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Offline PRO</title>

<style>
body { font-family: Arial; padding:10px; background:#f4f6f9; }
h1 { background:#111827; color:white; padding:12px; text-align:center; }
h2 { background:#1e3a8a; color:white; padding:8px; }
.card { background:white; padding:10px; margin-bottom:10px; border-radius:6px; }
input, textarea, select, button { width:100%; margin:5px 0; padding:8px; }
button { background:#2563eb; color:white; border:none; font-weight:bold; }
.estado { padding:8px; background:#e5e7eb; margin:5px 0; }
canvas { border:2px solid #1e3a8a; width:100%; height:140px; }
</style>
</head>

<body>

<h1>Pauta Offline PRO</h1>

<div class="estado" id="estadoConexion"></div>
<div class="estado" id="contadorPendientes"></div>

<div class="card">
<h2>Datos</h2>
<input id="carro" placeholder="Carro">
<input id="ot" placeholder="OT">
<input type="date" id="fechaInicio">
<input type="date" id="fechaTermino">
</div>

<div class="card">
<h2>Falla</h2>
<input id="parte" placeholder="Parte">
<textarea id="sintoma" placeholder="Síntoma"></textarea>
</div>

<div class="card">
<h2>5 Porqués</h2>
<textarea id="p1"></textarea>
<textarea id="p2"></textarea>
<textarea id="p3"></textarea>
</div>

<div class="card">
<h2>Acción</h2>
<textarea id="accion"></textarea>
</div>

<div class="card">
<h2>Responsable</h2>
<input id="colaborador" placeholder="Nombre">
<canvas id="firma"></canvas>
</div>

<div class="card">
<input type="file" id="foto" multiple>
</div>

<button onclick="guardarOEnviar()">Guardar / Enviar</button>
<button onclick="sincronizar()">Sincronizar</button>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzCP2skB2HFyNDrGu_CYbBN1KLQK8nuBDbIj7n8kp4I0qrkmjzYrHN6riyAon7BOTkTtQ/exec";
const DB_NAME = "DB";
const STORE = "pendientes";

let db;
let firmaHecha = false;

function estado() {
    document.getElementById("estadoConexion").innerText =
        navigator.onLine ? "🟢 Online" : "🔴 Offline";
}
window.addEventListener("online", estado);
window.addEventListener("offline", estado);
estado();

function abrirDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, 1);

        req.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore(STORE, { keyPath:"id", autoIncrement:true });
        };

        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = () => rej();
    });
}

function prepararFirma() {
    const canvas = document.getElementById("firma");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = 140;

    let dib = false;

    canvas.onmousedown = () => dib = true;
    canvas.onmouseup = () => dib = false;

    canvas.onmousemove = e => {
        if (!dib) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        firmaHecha = true;
    };
}
window.onload = prepararFirma;

function validar() {
    if (!carro.value || !ot.value || !sintoma.value || !p1.value || !p2.value || !p3.value) {
        alert("Faltan datos");
        return false;
    }
    if (!firmaHecha) {
        alert("Debe firmar");
        return false;
    }
    return true;
}

function base64(file) {
    return new Promise(r => {
        const rd = new FileReader();
        rd.onload = () => r(rd.result.split(",")[1]);
        rd.readAsDataURL(file);
    });
}

async function guardarOffline(data) {
    await abrirDB();
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).add(data);
}

async function enviar(data) {
    const r = await fetch(URL_SCRIPT, { method:"POST", body:JSON.stringify(data) });
    const t = await r.text();
    return t.includes("OK");
}

async function guardarOEnviar() {

    if (!validar()) return;

    let fotos = [];
    for (let f of foto.files) {
        fotos.push({ nombre:f.name, tipo:f.type, base64:await base64(f) });
    }

    const data = {
        carro: carro.value,
        ot: ot.value,
        fechaInicio: fechaInicio.value,
        fechaTermino: fechaTermino.value,
        parte: parte.value,
        sintoma: sintoma.value,
        p1: p1.value,
        p2: p2.value,
        p3: p3.value,
        accion: accion.value,
        colaborador: colaborador.value,
        firmaColaborador: firma.toDataURL(),
        fotos: fotos
    };

    if (navigator.onLine) {
        const ok = await enviar(data);

        if (ok) {
            alert("Enviado");
            limpiar();
            return;
        }
    }

    await guardarOffline(data);
    alert("Guardado offline");
}

async function sincronizar() {
    await abrirDB();

    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).getAll();

    req.onsuccess = async () => {
        const datos = req.result;

        for (let d of datos) {
            const ok = await enviar(d);
            if (ok) {
                const t2 = db.transaction(STORE,"readwrite");
                t2.objectStore(STORE).delete(d.id);
            }
        }

        alert("Sincronizado");
    };
}

function limpiar() {
    document.querySelectorAll("input,textarea").forEach(e => e.value="");
    firma.getContext("2d").clearRect(0,0,firma.width,firma.height);
    firmaHecha = false;
}
</script>

</body>
</html>
