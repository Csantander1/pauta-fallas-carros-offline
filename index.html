<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Offline PRO FINAL</title>

<style>
body { font-family: Arial; padding:10px; background:#f4f6f9; }
h1 { background:#111827; color:white; padding:12px; text-align:center; }
h2 { background:#1e3a8a; color:white; padding:8px; }
.card { background:white; padding:10px; margin-bottom:10px; border-radius:6px; }
input, textarea, select, button { width:100%; margin:5px 0; padding:8px; }
button { background:#2563eb; color:white; border:none; font-weight:bold; }
.estado { padding:8px; background:#e5e7eb; margin:5px 0; }
canvas { border:2px solid #1e3a8a; width:100%; height:140px; }
.itemPendiente { padding:5px; border-bottom:1px solid #ccc; font-size:14px; }
</style>
</head>

<body>

<h1>Pauta Digital Offline PRO</h1>

<div class="estado" id="estadoConexion"></div>
<div class="estado" id="contadorPendientes"></div>

<div class="card">
<h2>Pautas Pendientes</h2>
<div id="listaPendientes">No hay pendientes</div>
</div>

<div class="card">
<h2>Datos Generales</h2>
<input id="carro" placeholder="Carro">
<input id="ot" placeholder="OT">
<input type="date" id="fechaInicio">
<input type="date" id="fechaTermino">
</div>

<div class="card">
<h2>Sistema</h2>
<select id="sistema">
<option value="">Seleccione</option>
<option>Freno</option>
<option>Enganche</option>
<option>Rodado</option>
<option>Estructura</option>
</select>
</div>

<div class="card">
<h2>Falla</h2>
<input id="parte" placeholder="Parte">
<textarea id="sintoma"></textarea>
</div>

<div class="card">
<h2>5 Porqués</h2>
<textarea id="p1"></textarea>
<textarea id="p2"></textarea>
<textarea id="p3"></textarea>
<textarea id="p4"></textarea>
<textarea id="p5"></textarea>
</div>

<div class="card">
<h2>Causa</h2>
<label><input type="checkbox" value="Mano de Obra"> Mano de Obra</label><br>
<label><input type="checkbox" value="Método"> Método</label><br>
<label><input type="checkbox" value="Material"> Material</label><br>
<label><input type="checkbox" value="Equipo"> Equipo</label>
</div>

<div class="card">
<h2>Acción</h2>
<textarea id="accion"></textarea>
</div>

<div class="card">
<h2>Responsable</h2>
<input id="colaborador" placeholder="Nombre">
<canvas id="firma"></canvas>
</div>

<div class="card">
<input type="file" id="foto" multiple>
</div>

<button onclick="guardarOEnviar()">Guardar / Enviar</button>
<button onclick="sincronizar()">Sincronizar</button>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzCP2skB2HFyNDrGu_CYbBN1KLQK8nuBDbIj7n8kp4I0qrkmjzYrHN6riyAon7BOTkTtQ/exec";

const DB_NAME = "DB";
const STORE = "pendientes";

let db;
let firmaHecha = false;

// ================= ESTADO =================
function estado() {
    estadoConexion.innerText = navigator.onLine ? "🟢 Online" : "🔴 Offline";
}
window.addEventListener("online", () => { estado(); sincronizar(); });
window.addEventListener("offline", estado);
estado();

// ================= DB =================
function abrirDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore(STORE, { keyPath:"id", autoIncrement:true });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
    });
}

// ================= FIRMA =================
function prepararFirma() {
    const canvas = firma;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = 140;

    let dib = false;

    canvas.onmousedown = () => dib = true;
    canvas.onmouseup = () => dib = false;

    canvas.onmousemove = e => {
        if (!dib) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        firmaHecha = true;
    };
}
window.onload = prepararFirma;

// ================= VALIDACION =================
function validar() {
    if (!carro.value || !ot.value || !sintoma.value) return alert("Faltan datos"), false;
    if (!firmaHecha) return alert("Debe firmar"), false;
    return true;
}

// ================= BASE64 =================
function base64(file) {
    return new Promise(r => {
        const rd = new FileReader();
        rd.onload = () => r(rd.result.split(",")[1]);
        rd.readAsDataURL(file);
    });
}

// ================= GUARDAR OFFLINE =================
async function guardarOffline(data) {
    await abrirDB();
    db.transaction(STORE,"readwrite").objectStore(STORE).add(data);
    actualizarLista();
}

// ================= ENVIAR =================
async function enviar(data) {
    const r = await fetch(URL_SCRIPT, { method:"POST", body:JSON.stringify(data) });
    const t = await r.text();
    return t.includes("OK");
}

// ================= LOGICA PRINCIPAL =================
async function guardarOEnviar() {

    if (!validar()) return;

    let fotos = [];
    for (let f of foto.files) {
        fotos.push({ nombre:f.name, tipo:f.type, base64:await base64(f) });
    }

    const data = {
        idLocal: Date.now()+"_"+Math.random(),
        carro: carro.value,
        ot: ot.value,
        sintoma: sintoma.value,
        p1: p1.value,
        p2: p2.value,
        p3: p3.value,
        accion: accion.value,
        colaborador: colaborador.value,
        firmaColaborador: firma.toDataURL(),
        fotos: fotos
    };

    if (navigator.onLine) {
        const ok = await enviar(data);
        if (ok) {
            alert("Enviado");
            limpiar();
            return;
        }
    }

    await guardarOffline(data);
    alert("Guardado offline");
}

// ================= SINCRONIZAR =================
async function sincronizar() {
    await abrirDB();

    const tx = db.transaction(STORE,"readonly");
    const datos = await new Promise(res => {
        tx.objectStore(STORE).getAll().onsuccess = e => res(e.target.result);
    });

    for (let d of datos) {
        const ok = await enviar(d);
        if (ok) {
            db.transaction(STORE,"readwrite").objectStore(STORE).delete(d.id);
        }
    }

    actualizarLista();
}

// ================= LISTA =================
async function actualizarLista() {
    await abrirDB();

    const tx = db.transaction(STORE,"readonly");
    const datos = await new Promise(res => {
        tx.objectStore(STORE).getAll().onsuccess = e => res(e.target.result);
    });

    contadorPendientes.innerText = "Pendientes: " + datos.length;

    listaPendientes.innerHTML = "";

    if (datos.length === 0) {
        listaPendientes.innerHTML = "No hay pendientes";
        return;
    }

    datos.forEach(d => {
        listaPendientes.innerHTML += `
        <div class="itemPendiente">
        Carro: ${d.carro} | OT: ${d.ot}
        </div>`;
    });
}

// ================= LIMPIAR =================
function limpiar() {
    document.querySelectorAll("input,textarea").forEach(e => e.value="");
    firma.getContext("2d").clearRect(0,0,firma.width,firma.height);
    firmaHecha = false;
}

// INIT
abrirDB().then(actualizarLista);

</script>

</body>
</html>
